name: Auto Scanner

on:
  schedule:
    - cron: "*/5 * * * *"   # tiap 5 menit
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Scanner
        run: python scanner.py
