name: AI Trading System

on:
  schedule:
    - cron: "*/15 * * * *"   # tiap 15 menit
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # =========================
      # RUN OPTIMIZER 🔥
      # =========================
      - name: Run AI Optimizer
        run: python scripts/run_optimizer.py

      # =========================
      # RUN SCANNER
      # =========================
      - name: Run Scanner
        run: python scripts/run_scanner.py

      # =========================
      # COMMIT DATA
      # =========================
      - name: Commit data update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/*.csv data/*.json || true
          git commit -m "auto update trading data" || true
          git push
