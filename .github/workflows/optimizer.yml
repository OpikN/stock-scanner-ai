name: AI Optimizer

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  optimizer:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Fix path
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Run Optimizer
        run: python scripts/run_optimizer.py

      - name: Commit strategy
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add data/strategy.json data/last_opt.txt
          git commit -m "update strategy" || echo "no changes"
          git push
