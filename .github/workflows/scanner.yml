name: AI Scanner

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  scanner:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Fix path
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Run Scanner
        run: python scripts/run_scanner.py

      - name: Commit data
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add data/positions.csv data/state.json
          git commit -m "update scanner" || echo "no changes"
          git push
