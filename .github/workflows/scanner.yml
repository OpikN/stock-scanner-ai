name: Run AI Scanner

on:
  schedule:
    - cron: "*/15 * * * *"   # jalan tiap 15 menit
  workflow_dispatch:          # bisa run manual

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 WAJIB biar bisa save data

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scanner
        run: |
          python scripts/run_scanner.py

      - name: Commit data
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add data/
          git commit -m "auto update trades" || echo "no changes"
          git push
