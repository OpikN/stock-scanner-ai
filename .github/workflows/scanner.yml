name: AI Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas streamlit requests

      - name: Create data folder
        run: |
          mkdir -p data

      - name: Run Scanner
        run: python scripts/run_scanner.py

      - name: Commit positions
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/positions.csv || true
          git commit -m "update positions" || echo "no changes"

          git push
