name: AI Scanner

on:
  schedule:
    - cron: "*/10 * * * *"   # jalan tiap 10 menit
  workflow_dispatch:         # bisa run manual

permissions:
  contents: write            # WAJIB untuk push ke repo

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CLONE REPO
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v3

      # =========================
      # SETUP PYTHON
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          pip install yfinance pandas

      # =========================
      # RUN SCANNER
      # =========================
      - name: Run AI Scanner
        run: python scripts/run_scanner.py

      # =========================
      # COMMIT DATA KE REPO 🔥
      # =========================
      - name: Commit positions
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # pastikan folder ada
          mkdir -p data

          # add file (tidak error kalau belum ada)
          git add data/positions.csv || true

          # commit kalau ada perubahan
          git commit -m "update positions" || echo "no changes"

          # push ke repo
          git push
